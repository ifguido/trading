services:
  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://cryptotrader:cryptotrader@db:5432/cryptotrader
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ../config:/app/config:ro
      - bot-data:/app/data

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cryptotrader
      POSTGRES_PASSWORD: cryptotrader
      POSTGRES_DB: cryptotrader
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-LINE", "pg_isready", "-U", "cryptotrader"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

volumes:
  pgdata:
  bot-data:
